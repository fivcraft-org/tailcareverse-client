<!doctype html>
<html lang="en">

<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>TailCareVerse – The Social Network for Pets</title>

  <!-- SEO Description -->
  <meta name="description"
    content="TailCareVerse is a social network for pet lovers. Connect with pet owners, discover veterinarians, breeders, kennels, and pet shops all in one platform." />

  <!-- Keywords -->
  <meta name="keywords"
    content="tailcareverse, pet social network, pet owners, veterinarians, pet breeders, pet shops, kennels, pet marketplace, animal community" />

  <meta name="author" content="TailCareVerse Team" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.tailcareverse.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./public/favicon.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="black" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TailCareVerse – The Social Network for Pets" />
  <meta property="og:description"
    content="Connect • Discover • Care. Join TailCareVerse to explore vets, breeders, pet shops, and fellow pet lovers." />
  <meta property="og:url" content="https://www.tailcareverse.com/" />
  <meta property="og:image" content="https://www.tailcareverse.com/preview.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TailCareVerse – The Social Network for Pets" />
  <meta name="twitter:description" content="Join TailCareVerse – the social network built for pet lovers." />
  <meta name="twitter:image" content="https://www.tailcareverse.pet/preview.jpg" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <div id="modal-root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
